<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GymTracker Pro</title>
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json" />

  <style>
    :root{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:#e5e7eb;
      background:#0b1220;
    }
    body{
      margin:0;
      background:
        radial-gradient(1000px 600px at 10% 10%, rgba(99,102,241,.25), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(16,185,129,.20), transparent 55%),
        radial-gradient(1000px 700px at 50% 90%, rgba(244,63,94,.18), transparent 60%),
        #0b1220;
    }

    header{
      position: sticky;
      top: 0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,.06);
      border-bottom: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      z-index: 20;
    }

    .wrap{ padding: 14px 16px 96px; max-width: 980px; margin: 0 auto; }
    button,input,select{ font:inherit; }

    .btn{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color:#e5e7eb;
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;

      box-sizing: border-box;
      max-width: 100%;
    }
    .btn.primary{ background:#fff; color:#0b1220; border-color:#fff; }
    .btn.ghost{ background:transparent; border-color:rgba(255,255,255,.10); }

    .card{
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 14px;
      margin: 10px 0;
    }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .muted{ color: rgba(229,231,235,.72); font-size: 13px; }
    .pill{
      display:inline-flex; gap:8px; align-items:center;
      padding:8px 12px; border-radius:999px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      font-size:13px;
    }

    .bottomNav{
      position: fixed; left:0; right:0; bottom:0;
      background: rgba(10, 16, 32, .72);
      border-top: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      display:flex; justify-content:space-around; gap:6px;
      padding: 10px 10px 14px;
      z-index: 30;
    }
    .navBtn{
      display:flex; flex-direction:column; align-items:center; gap:6px;
      background:transparent; border:0; color: rgba(229,231,235,.65);
      padding: 8px 10px; border-radius:14px;
      cursor:pointer; min-width: 64px;
    }
    .navBtn.active{ color: rgba(167,139,250,.98); background: rgba(167,139,250,.12); }
    .navIcon{
      width:26px; height:26px; display:grid; place-items:center;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    .navLabel{ font-size: 12px; }

    .kpiGrid4{ display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
    .kpiBox{
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      min-height: 86px;
      display:flex; flex-direction:column; justify-content:center; gap:6px;
    }
    .kpiBox .ico{ opacity:.9; }
    .kpiBox .val{ font-size: 30px; font-weight: 900; letter-spacing: .2px; }
    .kpiBox .lbl{ font-size: 13px; opacity: .75; }
    .kpiPurple{ background: rgba(99,102,241,.45); }
    .kpiTeal{ background: rgba(6,182,212,.45); }
    .kpiPink{ background: rgba(244,114,182,.45); }
    .kpiGold{ background: rgba(255,200,87,.55); }

    .itemRow{
      display:flex; justify-content:space-between; align-items:center; gap:12px;
      padding: 14px;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
    }
    .left{ display:flex; align-items:center; gap:12px; min-width: 0; flex:1; }

    .exIconWrap{
      width:44px; height:44px; border-radius: 14px;
      display:grid; place-items:center;
      background: rgba(167,139,250,.14);
      border:1px solid rgba(167,139,250,.18);
      flex: 0 0 auto;
    }
    .exIconWrap.teal{ background: rgba(6,182,212,.14); border-color: rgba(6,182,212,.18); }
    .exIconWrap.pink{ background: rgba(244,114,182,.14); border-color: rgba(244,114,182,.18); }
    .exIconWrap.gold{ background: rgba(255,200,87,.14); border-color: rgba(255,200,87,.18); }
    .exIconWrap svg{ width:28px; height:28px; opacity:.95; }
    .titleLine{ display:flex; gap:10px; align-items:center; min-width:0; }
    .titleLine strong{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .filters{ display:flex; gap:10px; flex-wrap:wrap; margin: 10px 0 6px; }
    .fchip{
      padding:10px 14px; border-radius: 999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: rgba(229,231,235,.8);
      cursor:pointer;
      display:inline-flex; align-items:center; gap:8px;
    }
    .fchip.active{
      background: rgba(167,139,250,.22);
      border-color: rgba(167,139,250,.35);
      color:#fff;
    }

    .setline{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .setline input{
      width: 92px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color:#e5e7eb;
    }

    .chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .chip{
      padding:8px 12px; border-radius:999px; font-size:13px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }
    .pr{
      border-color: rgba(16,185,129,.55)!important;
      background: rgba(16,185,129,.16)!important;
    }
    .prText{ color: rgba(16,185,129,.95); font-weight:800; }

    .detailHeader{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .detailTitle{ display:flex; flex-direction:column; gap:2px; }
    .detailTitle h2{ margin:0; font-size:22px; }
    .detailTitle .sub{ color: rgba(229,231,235,.68); font-size:13px; }

    .kpiGrid2{ display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; margin-top:14px; }
    .kpi{
      border-radius:18px; padding:16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
    }
    .kpi.gold{ background: rgba(255, 200, 87, .92); border-color: rgba(255, 200, 87, .35); color:#0b1220; }
    .kpi .label{ font-size:13px; opacity:.75; }
    .kpi.gold .label{ opacity:.85; }
    .kpi .value{ margin-top:8px; font-size:30px; font-weight:900; letter-spacing:.2px; }
    .kpi .value.sm{ font-size:20px; font-weight:900; }

    .sectionCard{ margin-top:14px; border-radius:18px; padding:14px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.06); }
    .sectionTitle{ font-weight:900; margin:0 0 10px; }
    .canvasWrap{ border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.04); }
    .canvasWrap canvas{
    width:100%;
    height:260px;      /* фіксуємо висоту */
    display:block;
  }

    /* Body measurements */
    .bodyGrid{ display:grid; grid-template-columns: repeat(6, minmax(180px, 1fr)); gap:10px; align-items:end; }
    .bodyField .btn{ width:100%; }
    .bodyActions{ grid-column: 1 / -1; display:flex; justify-content:flex-end; }
    @media (max-width: 980px){
      .bodyGrid{ grid-template-columns: repeat(3, minmax(180px, 1fr)); }
    }
    @media (max-width: 560px){
      .bodyGrid{ grid-template-columns: repeat(2, minmax(180px, 1fr)); }
    }

    .histItem{ border-radius:18px; padding:14px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.06); }
    .histTop{ display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .histDate{ font-weight:900; font-size:16px; }
    .histBottom{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,.10); }
    .histLeftBig{ font-weight:900; font-size:18px; color: rgba(167, 139, 250, .95); }
    .histRight{ color: rgba(229,231,235,.7); font-size:13px; }

    .errBox{
      border-radius:18px;
      padding:14px;
      border:1px solid rgba(244,63,94,.45);
      background: rgba(244,63,94,.10);
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: rgba(255,255,255,.92);
    }

    @media (max-width:520px){ .wrap{ padding-bottom: 110px; } }
  </style>
  <style>
    /* Premium 2026 refresh */
    :root{
      color-scheme:dark;
      --bg:#080b12;
      --surface:rgba(18,24,38,.78);
      --surface-strong:rgba(24,31,49,.94);
      --line:rgba(255,255,255,.09);
      --text:#f8fafc;
      --muted:#9aa6ba;
      --violet:#8b5cf6;
      --cyan:#22d3ee;
      --rose:#fb7185;
      --gold:#fbbf24;
      --green:#34d399;
      --shadow:0 24px 70px rgba(0,0,0,.34);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    html{min-height:100%;background:var(--bg);overflow-x:hidden}
    body{
      min-height:100vh;
      overflow-x:hidden;
      color:var(--text);
      background:
        radial-gradient(900px 520px at -10% -5%,rgba(124,58,237,.26),transparent 62%),
        radial-gradient(800px 500px at 105% 12%,rgba(6,182,212,.17),transparent 58%),
        radial-gradient(700px 520px at 50% 105%,rgba(244,63,94,.12),transparent 62%),
        linear-gradient(145deg,#080b12 0%,#0b1020 48%,#090c14 100%);
      background-attachment:fixed;
    }
    body:before{
      content:"";position:fixed;inset:0;pointer-events:none;opacity:.22;
      background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
      background-size:42px 42px;mask-image:linear-gradient(to bottom,#000,transparent 80%);
    }
    header{
      height:78px;padding:12px max(18px,calc((100vw - 1120px)/2));
      background:rgba(8,11,18,.72);border-bottom:1px solid var(--line);
      backdrop-filter:blur(24px) saturate(140%);
    }
    .brand{display:flex;align-items:center;gap:12px}
    .brandMark{
      width:44px;height:44px;border-radius:15px;display:grid;place-items:center;
      font-size:22px;background:linear-gradient(145deg,var(--violet),#5b21b6);
      box-shadow:0 10px 30px rgba(124,58,237,.36),inset 0 1px rgba(255,255,255,.32);
    }
    .brandEyebrow{text-transform:uppercase;letter-spacing:.16em;font-size:10px;font-weight:800;color:#a9b5c8}
    .brandTitle{font-size:20px;font-weight:850;letter-spacing:-.03em}
    .wrap{padding:22px 18px 118px;max-width:1120px}
    .card,.sectionCard,.itemRow,.histItem{
      border:1px solid var(--line);
      background:linear-gradient(145deg,rgba(25,32,51,.82),rgba(14,19,31,.72));
      box-shadow:0 14px 45px rgba(0,0,0,.16),inset 0 1px rgba(255,255,255,.035);
      backdrop-filter:blur(18px);
    }
    .card{border-radius:24px;padding:20px;margin:14px 0}
    .sectionCard,.histItem{border-radius:20px}
    .itemRow{border-radius:20px;padding:13px 14px;transition:.2s ease}
    .itemRow:hover{transform:translateY(-1px);border-color:rgba(139,92,246,.32);background:linear-gradient(145deg,rgba(34,42,64,.9),rgba(17,23,37,.82))}
    h2{letter-spacing:-.035em}
    .muted,.detailTitle .sub{color:var(--muted)}
    .btn{
      min-height:42px;border-radius:14px;border-color:var(--line);
      background:rgba(255,255,255,.055);font-weight:720;
      transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease;
    }
    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.17)}
    .btn.primary{
      color:white;border-color:rgba(167,139,250,.45);
      background:linear-gradient(135deg,#8b5cf6,#6d28d9);
      box-shadow:0 10px 28px rgba(109,40,217,.28),inset 0 1px rgba(255,255,255,.28);
    }
    input.btn,select.btn,.setline input{
      color:var(--text);background:rgba(5,8,15,.52);outline:none;
    }
    input.btn:focus,select.btn:focus,.setline input:focus{border-color:#8b5cf6;box-shadow:0 0 0 4px rgba(139,92,246,.13)}
    select option{background:#111827}
    .pill,.fchip,.chip{border-color:var(--line);background:rgba(255,255,255,.05)}
    .fchip{font-weight:720}
    .fchip.active{background:linear-gradient(135deg,rgba(139,92,246,.34),rgba(34,211,238,.12));border-color:rgba(167,139,250,.45)}
    .filters{flex-wrap:nowrap;overflow-x:auto;padding:2px 1px 7px;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .kpiGrid4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .kpiBox{position:relative;overflow:hidden;min-height:132px;border-radius:22px;padding:18px}
    .kpiBox:after{content:"";position:absolute;width:100px;height:100px;right:-34px;top:-42px;border-radius:50%;background:rgba(255,255,255,.12);filter:blur(2px)}
    .kpiBox .ico{font-size:20px}
    .kpiBox .val{font-size:34px;letter-spacing:-.04em}
    .kpiPurple{background:linear-gradient(145deg,rgba(124,58,237,.76),rgba(76,29,149,.74))}
    .kpiTeal{background:linear-gradient(145deg,rgba(8,145,178,.72),rgba(14,116,144,.68))}
    .kpiPink{background:linear-gradient(145deg,rgba(219,39,119,.66),rgba(157,23,77,.7))}
    .kpiGold{color:#fff;background:linear-gradient(145deg,rgba(217,119,6,.76),rgba(146,64,14,.75))}
    .exIconWrap{width:48px;height:48px;border-radius:16px}
    .canvasWrap{background:rgba(3,6,12,.48);border-color:var(--line)}
    .bodyGrid{grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .bodyField{min-width:0;display:grid;gap:7px}
    .bodyField .btn{display:block;width:100%;min-width:0;max-width:100%;overflow:hidden}
    .bodyField input[type="date"]{appearance:none;-webkit-appearance:none}
    .bodyActions{margin-top:4px}
    .chartSurface{
      min-height:230px;padding:16px;border-radius:18px;overflow:visible;
      border:1px solid rgba(255,255,255,.07);
      background:
        radial-gradient(420px 180px at 20% 0%,rgba(139,92,246,.12),transparent 70%),
        rgba(3,6,12,.44);
    }
    .chartHeader{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:14px}
    .chartBig{font-size:27px;font-weight:900;letter-spacing:-.04em}
    .chartDelta{font-size:12px;font-weight:850;padding:6px 9px;border-radius:999px;background:rgba(52,211,153,.11);color:#6ee7b7;white-space:nowrap}
    .chartDelta.down{background:rgba(251,113,133,.11);color:#fda4af}
    .trendSvg{display:block;width:100%;height:190px;overflow:visible}
    .pointLabel{font-size:4.4px;font-weight:850;fill:#f8fafc;paint-order:stroke;stroke:#0b1020;stroke-width:2.1px;stroke-linejoin:round}
    .pointLabel.last{fill:#fff;font-size:5px}
    .trendLabels{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-top:3px}
    .chartStats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:13px}
    .chartStat{padding:9px 10px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .chartStat span{display:block;font-size:10px;color:var(--muted)}
    .chartStat strong{display:block;margin-top:3px;font-size:13px;font-variant-numeric:tabular-nums}
    .distribution{display:grid;gap:12px}
    .distRow{display:grid;grid-template-columns:minmax(72px,110px) 1fr auto;align-items:center;gap:10px}
    .distName{font-size:12px;font-weight:760;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .distName small{display:block;margin-top:2px;font-size:9px;color:var(--muted);font-weight:650}
    .distTrack{height:10px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}
    .distFill{display:block;height:100%;min-width:5px;border-radius:inherit;background:linear-gradient(90deg,var(--bar-color),var(--bar-color-light));box-shadow:0 0 16px var(--bar-glow)}
    .distValue{font-size:12px;color:#cbd5e1;font-weight:800;min-width:38px;text-align:right}
    .bodyCharts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .bodyTrendCard{padding:15px;border:1px solid var(--line);border-radius:19px;background:rgba(4,8,16,.38);min-width:0}
    .bodyTrendCard.primary{grid-column:1/-1}
    .bodyTrendTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .bodyTrendName{font-size:13px;color:var(--muted);font-weight:750}
    .bodyTrendValue{font-size:24px;font-weight:900;letter-spacing:-.035em;margin-top:4px}
    .miniTrend{width:100%;height:100px;display:block;margin-top:8px;overflow:visible}
    .miniPointLabel{font-size:5px;font-weight:850;fill:#e9edf7;paint-order:stroke;stroke:#0b1020;stroke-width:1.8px;stroke-linejoin:round}
    .exerciseArt svg{width:34px;height:34px}
    .sectionCard{transition:border-color .2s ease,transform .2s ease}
    .sectionCard:focus-within{border-color:rgba(139,92,246,.28)}
    .chartSurface,.bodyTrendCard{animation:surfaceIn .35s ease both}
    @keyframes surfaceIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    @media(prefers-reduced-motion:reduce){.chartSurface,.bodyTrendCard{animation:none}.itemRow,.btn{transition:none}}
    .bottomNav{
      left:50%;right:auto;bottom:14px;transform:translateX(-50%);
      width:min(760px,calc(100% - 28px));display:grid;grid-template-columns:repeat(7,minmax(0,1fr));
      gap:4px;padding:8px;border:1px solid rgba(255,255,255,.11);border-radius:24px;
      background:rgba(12,16,27,.84);box-shadow:var(--shadow);backdrop-filter:blur(28px) saturate(150%);
    }
    .navBtn{min-width:0;width:100%;padding:8px 3px;gap:4px;border-radius:17px}
    .navBtn.active{color:#fff;background:linear-gradient(145deg,rgba(139,92,246,.34),rgba(109,40,217,.16))}
    .navIcon{width:30px;height:30px;border:0;background:transparent;font-size:17px}
    .navLabel{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .restPanel{
      display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;
      border-radius:22px;padding:16px 18px;margin:14px 0;border:1px solid rgba(34,211,238,.18);
      background:linear-gradient(135deg,rgba(8,145,178,.15),rgba(124,58,237,.12));
    }
    .restRing{
      width:66px;height:66px;border-radius:50%;display:grid;place-items:center;
      background:conic-gradient(var(--cyan) var(--timer-progress,0%),rgba(255,255,255,.08) 0);
      box-shadow:0 0 28px rgba(34,211,238,.13);
    }
    .restRing:after{content:"";width:52px;height:52px;border-radius:50%;background:#111827;position:absolute}
    .restValue{position:relative;z-index:1;font-size:17px;font-weight:900;font-variant-numeric:tabular-nums}
    .restActions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .premiumNote{padding:12px 14px;border-radius:16px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.18);color:#b7f7dd}
    .calorieCard{
      display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:12px;padding:15px 17px;
      border-radius:18px;border:1px solid rgba(251,146,60,.2);
      background:linear-gradient(135deg,rgba(234,88,12,.17),rgba(245,158,11,.07));
      box-shadow:inset 0 1px rgba(255,255,255,.04);
    }
    .calorieValue{font-size:25px;font-weight:900;letter-spacing:-.04em;color:#fdba74;white-space:nowrap}
    @media(max-width:760px){
      header{height:70px;padding:10px 16px}.brandMark{width:40px;height:40px}.brandTitle{font-size:18px}
      .wrap{padding:16px 16px 112px}.card{padding:16px;border-radius:22px}
      .kpiGrid4{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
      .kpiBox{min-height:118px;padding:15px}.kpiBox .val{font-size:31px}
      .bodyGrid{grid-template-columns:1fr}
      .bodyCharts{grid-template-columns:1fr}
      .bodyTrendCard.primary{grid-column:auto}
      .itemRow{align-items:flex-start}.itemRow>.row{justify-content:flex-end}
      .bottomNav{bottom:8px;width:calc(100% - 16px);border-radius:21px;padding:6px 4px}
      .navBtn{padding:7px 1px}.navIcon{width:27px;height:27px}.navLabel{font-size:9px}
    }
    @media(max-width:460px){
      .bodyGrid{grid-template-columns:1fr}.bodyActions{grid-column:auto}.bodyActions .btn{width:100%}
      .chartSurface{padding:14px;min-height:218px}.chartBig{font-size:24px}.distRow{grid-template-columns:76px 1fr 42px}
      .itemRow{flex-direction:column}.itemRow>.left{width:100%}.itemRow>.row{width:100%;display:grid;grid-auto-flow:column;grid-auto-columns:1fr}.itemRow>.row .btn{width:100%}
      .setline{display:grid;grid-template-columns:auto 1fr 1fr auto}.setline input{width:100%;min-width:0}
      .restPanel{grid-template-columns:auto 1fr}.restActions{grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr)}
      .brandEyebrow{display:none}
    }
  </style>
</head>

</body>
</html>
