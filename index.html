<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GymTracker Pro</title>
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json" />

  <style>
    :root{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:#e5e7eb;
      background:#0b1220;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }
    *,*::before,*::after{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(1000px 600px at 10% 10%, rgba(99,102,241,.25), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(16,185,129,.20), transparent 55%),
        radial-gradient(1000px 700px at 50% 90%, rgba(244,63,94,.18), transparent 60%),
        #0b1220;
    }

    header{
      position: sticky;
      top: 0;
      padding: calc(14px + var(--safe-top)) calc(16px + var(--safe-right)) 14px calc(16px + var(--safe-left));
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,.06);
      border-bottom: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      z-index: 20;
    }

    .wrap{ padding: 14px calc(16px + var(--safe-right)) calc(96px + var(--safe-bottom)) calc(16px + var(--safe-left)); max-width: 980px; margin: 0 auto; }
    button,input,select{ font:inherit; }

    .btn{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color:#e5e7eb;
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;

      box-sizing: border-box;
      max-width: 100%;
    }
    .btn.primary{ background:#fff; color:#0b1220; border-color:#fff; }
    .btn.ghost{ background:transparent; border-color:rgba(255,255,255,.10); }

    .card{
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 14px;
      margin: 10px 0;
    }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .muted{ color: rgba(229,231,235,.72); font-size: 13px; }
    .pill{
      display:inline-flex; gap:8px; align-items:center;
      padding:8px 12px; border-radius:999px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      font-size:13px;
    }

    .bottomNav{
      position: fixed; left:0; right:0; bottom:0;
      background: rgba(10, 16, 32, .72);
      border-top: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      display:flex; justify-content:space-around; gap:6px;
      padding: 10px calc(10px + var(--safe-right)) calc(14px + var(--safe-bottom)) calc(10px + var(--safe-left));
      z-index: 30;
    }
    .navBtn{
      display:flex; flex-direction:column; align-items:center; gap:6px;
      background:transparent; border:0; color: rgba(229,231,235,.65);
      padding: 8px 10px; border-radius:14px;
      cursor:pointer; min-width: 64px;
    }
    .navBtn.active{ color: rgba(167,139,250,.98); background: rgba(167,139,250,.12); }
    .navIcon{
      width:26px; height:26px; display:grid; place-items:center;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    .navLabel{ font-size: 12px; }

    .kpiGrid4{ display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
    .kpiBox{
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      min-height: 86px;
      display:flex; flex-direction:column; justify-content:center; gap:6px;
    }
    .kpiBox .ico{ opacity:.9; }
    .kpiBox .val{ font-size: 30px; font-weight: 900; letter-spacing: .2px; }
    .kpiBox .lbl{ font-size: 13px; opacity: .75; }
    .kpiPurple{ background: rgba(99,102,241,.45); }
    .kpiTeal{ background: rgba(6,182,212,.45); }
    .kpiPink{ background: rgba(244,114,182,.45); }
    .kpiGold{ background: rgba(255,200,87,.55); }
    .kpiClickable,.recordRow{cursor:pointer;transition:transform .16s ease,border-color .16s ease}
    .kpiClickable:active,.recordRow:active{transform:scale(.985)}
    .recordRow:hover{border-color:rgba(167,139,250,.26)}

    .itemRow{
      display:flex; justify-content:space-between; align-items:center; gap:12px;
      padding: 14px;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
    }
    .left{ display:flex; align-items:center; gap:12px; min-width: 0; flex:1; }

    .exIconWrap{
      width:44px; height:44px; border-radius: 14px;
      display:grid; place-items:center;
      background: rgba(167,139,250,.14);
      border:1px solid rgba(167,139,250,.18);
      flex: 0 0 auto;
    }
    .exIconWrap.teal{ background: rgba(6,182,212,.14); border-color: rgba(6,182,212,.18); }
    .exIconWrap.pink{ background: rgba(244,114,182,.14); border-color: rgba(244,114,182,.18); }
    .exIconWrap.gold{ background: rgba(255,200,87,.14); border-color: rgba(255,200,87,.18); }
    .exIconWrap svg{ width:28px; height:28px; opacity:.95; }
    .titleLine{ display:flex; gap:10px; align-items:center; min-width:0; }
    .titleLine strong{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .filters{ display:flex; gap:10px; flex-wrap:wrap; margin: 10px 0 6px; }
    .fchip{
      padding:10px 14px; border-radius: 999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: rgba(229,231,235,.8);
      cursor:pointer;
      display:inline-flex; align-items:center; gap:8px;
    }
    .fchip.active{
      background: rgba(167,139,250,.22);
      border-color: rgba(167,139,250,.35);
      color:#fff;
    }

    .setline{display:grid;grid-template-columns:auto repeat(2,minmax(92px,160px)) auto;gap:8px;align-items:end;justify-content:start}
    .setline-reps,.setline-time{grid-template-columns:auto minmax(92px,180px) auto}
    .setline input{
      width: 92px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color:#e5e7eb;
    }
    .setField{display:grid;gap:5px;min-width:92px}
    .setField>span{font-size:9px;font-weight:800;letter-spacing:.03em;color:var(--muted)}
    .setField input{width:100%}

    .chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .chip{
      padding:8px 12px; border-radius:999px; font-size:13px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }
    .pr{
      border-color: rgba(16,185,129,.55)!important;
      background: rgba(16,185,129,.16)!important;
    }
    .prText{ color: rgba(16,185,129,.95); font-weight:800; }

    .detailHeader{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .detailTitle{ display:flex; flex-direction:column; gap:2px; }
    .detailTitle h2{ margin:0; font-size:22px; }
    .detailTitle .sub{ color: rgba(229,231,235,.68); font-size:13px; }

    .kpiGrid2{ display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; margin-top:14px; }
    .kpi{
      border-radius:18px; padding:16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
    }
    .kpi.gold{ background: rgba(255, 200, 87, .92); border-color: rgba(255, 200, 87, .35); color:#0b1220; }
    .kpi .label{ font-size:13px; opacity:.75; }
    .kpi.gold .label{ opacity:.85; }
    .kpi .value{ margin-top:8px; font-size:30px; font-weight:900; letter-spacing:.2px; }
    .kpi .value.sm{ font-size:20px; font-weight:900; }

    .sectionCard{ margin-top:14px; border-radius:18px; padding:14px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.06); }
    .sectionTitle{ font-weight:900; margin:0 0 10px; }
    .canvasWrap{ border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.04); }
    .canvasWrap canvas{
    width:100%;
    height:260px;      /* фіксуємо висоту */
    display:block;
  }

    /* Body measurements */
    .bodyGrid{ display:grid; grid-template-columns: repeat(6, minmax(180px, 1fr)); gap:10px; align-items:end; }
    .bodyField .btn{ width:100%; }
    .bodyActions{ grid-column: 1 / -1; display:flex; justify-content:flex-end; }
    @media (max-width: 980px){
      .bodyGrid{ grid-template-columns: repeat(3, minmax(180px, 1fr)); }
    }
    @media (max-width: 560px){
      .bodyGrid{ grid-template-columns: repeat(2, minmax(180px, 1fr)); }
    }

    .histItem{ border-radius:18px; padding:14px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.06); }
    .histTop{ display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .histDate{ font-weight:900; font-size:16px; }
    .histBottom{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,.10); }
    .histLeftBig{ font-weight:900; font-size:18px; color: rgba(167, 139, 250, .95); }
    .histRight{ color: rgba(229,231,235,.7); font-size:13px; }

    .errBox{
      border-radius:18px;
      padding:14px;
      border:1px solid rgba(244,63,94,.45);
      background: rgba(244,63,94,.10);
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: rgba(255,255,255,.92);
    }

    @media (max-width:520px){ .wrap{ padding-bottom: 110px; } }
  </style>
  <style>
    /* Premium 2026 refresh */
    :root{
      color-scheme:dark;
      --bg:#080b12;
      --surface:rgba(18,24,38,.78);
      --surface-strong:rgba(24,31,49,.94);
      --line:rgba(255,255,255,.09);
      --text:#f8fafc;
      --muted:#9aa6ba;
      --violet:#8b5cf6;
      --cyan:#22d3ee;
      --rose:#fb7185;
      --gold:#fbbf24;
      --green:#34d399;
      --shadow:0 24px 70px rgba(0,0,0,.34);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    html{min-height:100%;background:var(--bg);overflow-x:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%}
    body{
      min-height:100vh;
      overflow-x:hidden;
      color:var(--text);
      background:
        radial-gradient(900px 520px at -10% -5%,rgba(124,58,237,.26),transparent 62%),
        radial-gradient(800px 500px at 105% 12%,rgba(6,182,212,.17),transparent 58%),
        radial-gradient(700px 520px at 50% 105%,rgba(244,63,94,.12),transparent 62%),
        linear-gradient(145deg,#080b12 0%,#0b1020 48%,#090c14 100%);
      background-attachment:fixed;
    }
    body:before{
      content:"";position:fixed;inset:0;pointer-events:none;opacity:.22;
      background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
      background-size:42px 42px;mask-image:linear-gradient(to bottom,#000,transparent 80%);
    }
    header{
      height:78px;padding:12px max(18px,calc((100vw - 1120px)/2));
      background:rgba(8,11,18,.72);border-bottom:1px solid var(--line);
      backdrop-filter:blur(24px) saturate(140%);
    }
    .brand{display:flex;align-items:center;gap:12px}
    .brandMark{
      width:44px;height:44px;border-radius:15px;display:grid;place-items:center;
      font-size:22px;background:linear-gradient(145deg,var(--violet),#5b21b6);
      box-shadow:0 10px 30px rgba(124,58,237,.36),inset 0 1px rgba(255,255,255,.32);
    }
    .brandEyebrow{text-transform:uppercase;letter-spacing:.16em;font-size:10px;font-weight:800;color:#a9b5c8}
    .brandTitle{font-size:20px;font-weight:850;letter-spacing:-.03em}
    .wrap{padding:22px 18px 118px;max-width:1120px}
    .card,.sectionCard,.itemRow,.histItem{
      border:1px solid var(--line);
      background:linear-gradient(145deg,rgba(25,32,51,.82),rgba(14,19,31,.72));
      box-shadow:0 14px 45px rgba(0,0,0,.16),inset 0 1px rgba(255,255,255,.035);
      backdrop-filter:blur(18px);
    }
    .card{border-radius:24px;padding:20px;margin:14px 0}
    .sectionCard,.histItem{border-radius:20px}
    .itemRow{border-radius:20px;padding:13px 14px;transition:.2s ease}
    .itemRow:hover{transform:translateY(-1px);border-color:rgba(139,92,246,.32);background:linear-gradient(145deg,rgba(34,42,64,.9),rgba(17,23,37,.82))}
    h2{letter-spacing:-.035em}
    .muted,.detailTitle .sub{color:var(--muted)}
    .btn{
      min-height:42px;border-radius:14px;border-color:var(--line);
      background:rgba(255,255,255,.055);font-weight:720;
      transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease;
    }
    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.17)}
    .btn.primary{
      color:white;border-color:rgba(167,139,250,.45);
      background:linear-gradient(135deg,#8b5cf6,#6d28d9);
      box-shadow:0 10px 28px rgba(109,40,217,.28),inset 0 1px rgba(255,255,255,.28);
    }
    input.btn,select.btn,.setline input{
      color:var(--text);background:rgba(5,8,15,.52);outline:none;
    }
    input.btn:focus,select.btn:focus,.setline input:focus{border-color:#8b5cf6;box-shadow:0 0 0 4px rgba(139,92,246,.13)}
    select option{background:#111827}
    .pill,.fchip,.chip{border-color:var(--line);background:rgba(255,255,255,.05)}
    .fchip{font-weight:720}
    .fchip.active{background:linear-gradient(135deg,rgba(139,92,246,.34),rgba(34,211,238,.12));border-color:rgba(167,139,250,.45)}
    .filters{flex-wrap:nowrap;overflow-x:auto;padding:2px 1px 7px;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .categoryRail{
      display:grid;grid-auto-flow:column;grid-auto-columns:max-content;gap:8px;
      width:100%;max-width:100%;overflow-x:auto;overscroll-behavior-inline:contain;
      padding:7px;margin:14px 0 7px;border:1px solid var(--line);border-radius:18px;
      background:rgba(4,7,14,.42);scroll-snap-type:x proximity;scrollbar-width:none;
      -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 12px,#000 calc(100% - 12px),transparent 100%);
      mask-image:linear-gradient(90deg,transparent 0,#000 12px,#000 calc(100% - 12px),transparent 100%);
    }
    .categoryRail::-webkit-scrollbar{display:none}
    .categoryRail .fchip{
      flex:none;white-space:nowrap;scroll-snap-align:start;padding:9px 13px;border-radius:13px;
      font-size:12px;min-height:38px;
    }
    .newCategoryFields{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;width:100%}
    .guideHero{
      min-width:0;overflow:hidden;padding:18px;border-radius:22px;border:1px solid rgba(34,211,238,.18);
      background:radial-gradient(260px 130px at 100% 0,rgba(34,211,238,.15),transparent 70%),linear-gradient(145deg,rgba(76,29,149,.25),rgba(5,9,18,.55));
    }
    .guideFlow{display:flex;align-items:center;gap:7px;overflow-x:auto;margin-top:14px;padding-bottom:3px;scrollbar-width:none}
    .guideFlow::-webkit-scrollbar{display:none}
    .guideFlowStep{flex:none;display:grid;place-items:center;width:30px;height:30px;border-radius:10px;font-size:11px;font-weight:900;color:#ddd6fe;background:rgba(139,92,246,.2);border:1px solid rgba(167,139,250,.3)}
    .guideFlowArrow{flex:none;color:rgba(148,163,184,.55)}
    .guideList{display:grid;gap:10px;margin-top:14px}
    .guideMaster{border:1px solid rgba(167,139,250,.2);border-radius:22px;background:rgba(5,8,15,.35);overflow:hidden}
    .guideMaster>summary{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;list-style:none}
    .guideMaster>summary::-webkit-details-marker{display:none}
    .guideMasterIcon{display:grid;place-items:center;width:42px;height:42px;flex:0 0 auto;border-radius:14px;background:linear-gradient(135deg,rgba(139,92,246,.38),rgba(34,211,238,.16));border:1px solid rgba(167,139,250,.28)}
    .guideMasterTitle{min-width:0;flex:1}.guideMasterTitle strong{display:block;font-size:16px}.guideMasterTitle span{display:block;margin-top:3px;font-size:11px;color:var(--muted)}
    .guideMasterChevron{color:#c4b5fd;transition:transform .2s}.guideMaster[open] .guideMasterChevron{transform:rotate(180deg)}
    .guideMasterBody{padding:0 12px 12px}
    .guideRole{margin-top:12px;border:1px solid rgba(103,232,249,.16);border-radius:20px;background:linear-gradient(145deg,rgba(15,23,42,.72),rgba(7,11,22,.76));overflow:hidden}
    .guideRole>summary{display:flex;align-items:center;gap:12px;padding:15px;cursor:pointer;list-style:none}
    .guideRole>summary::-webkit-details-marker{display:none}
    .guideRole>summary>span:nth-child(2){min-width:0;flex:1}
    .guideRole>summary strong{display:block;font-size:17px}
    .guideRole>summary small{display:block;margin-top:3px;color:var(--muted);font-size:11px;line-height:1.35}
    .guideRoleIcon{display:grid;place-items:center;width:42px;height:42px;flex:0 0 auto;border-radius:14px;color:#67e8f9;background:rgba(34,211,238,.12);border:1px solid rgba(103,232,249,.22)}
    .guideRoleIcon.trainer{color:#c4b5fd;background:rgba(139,92,246,.15);border-color:rgba(196,181,253,.24)}
    .guideRoleChevron{color:var(--muted);transition:transform .2s}.guideRole[open] .guideRoleChevron{transform:rotate(180deg)}
    .guideRoleBody{padding:0 10px 10px}
    .guideStep{border:1px solid var(--line);border-radius:19px;background:rgba(5,8,15,.42);overflow:hidden}
    .guideStep summary{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;list-style:none}
    .guideStep summary::-webkit-details-marker{display:none}
    .guideNumber{display:grid;place-items:center;flex:0 0 auto;width:34px;height:34px;border-radius:12px;font-size:12px;font-weight:950;color:#fff;background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
    .guideSummaryText{min-width:0;flex:1}.guideSummaryText strong{display:block}.guideSummaryText span{display:block;margin-top:3px;font-size:11px;color:var(--muted)}
    .guideChevron{color:var(--muted);transition:transform .2s}.guideStep[open] .guideChevron{transform:rotate(180deg)}
    .guideContent{display:grid;grid-template-columns:1fr;gap:14px;padding:0 14px 14px}
    .guideHero>div{overflow-wrap:anywhere}
    .guideCopy{font-size:13px;line-height:1.55;color:#cbd5e1}.guideCopy strong{color:#fff}
    .guideExample{margin-top:9px;padding:9px 11px;border-radius:12px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.15);color:#a7f3d0;font-size:11px}
    .miniScreen{align-self:start;width:100%;padding:10px;border-radius:17px;border:1px solid rgba(255,255,255,.1);background:#0a0f1d;box-shadow:0 12px 28px rgba(0,0,0,.24)}
    .miniTop{height:5px;width:34px;margin:0 auto 9px;border-radius:99px;background:rgba(255,255,255,.13)}
    .miniTitle{font-size:10px;font-weight:900;margin-bottom:7px}.miniRow{display:flex;gap:5px;margin-top:5px}
    .miniField{min-width:0;flex:1;padding:7px;border-radius:8px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);font-size:8px;color:#cbd5e1}
    .miniButton{padding:7px 9px;border-radius:8px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);font-size:8px;font-weight:850;white-space:nowrap}
    .miniBar{height:6px;margin-top:8px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}.miniBar span{display:block;height:100%;width:68%;background:linear-gradient(90deg,#8b5cf6,#22d3ee)}
    .miniStat{flex:1;padding:8px;border-radius:9px;background:rgba(255,255,255,.055);font-size:8px}.miniStat strong{display:block;font-size:13px;margin-top:3px}
    .settingsActions{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-top:12px}
    .settingsActions .btn{width:100%;white-space:normal}
    .profileButton{max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .modeOverlay{position:fixed;inset:0;z-index:300;display:grid;place-items:center;padding:18px;background:rgba(2,5,12,.82);backdrop-filter:blur(18px)}
    .modePanel{width:min(720px,100%);padding:24px;border:1px solid rgba(167,139,250,.25);border-radius:28px;background:linear-gradient(145deg,#171d30,#0b101c);box-shadow:0 30px 90px rgba(0,0,0,.5)}
    .modeChoices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:18px}
    .modeChoice{padding:20px;text-align:left;border:1px solid var(--line);border-radius:22px;color:var(--text);background:rgba(255,255,255,.045);cursor:pointer}
    .modeChoice:hover{border-color:rgba(167,139,250,.45);background:rgba(139,92,246,.1)}
